name: Verify Sources

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "problem-packs/**/evidence.json"
      - "scripts/verify-sources.mjs"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  verify-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify evidence source URLs
        run: pnpm verify:sources

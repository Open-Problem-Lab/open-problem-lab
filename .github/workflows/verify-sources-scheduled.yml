name: Scheduled Source Health Check

# Periodically re-checks every evidence-record URL so link rot is caught
# automatically instead of only when a pack is next edited. This is a health
# check, not a PR gate: a failure means a source needs re-verification or
# re-sourcing, surfaced via the Actions run and its failure notification.

on:
  schedule:
    # 07:00 UTC every Monday
    - cron: "0 7 * * 1"
  workflow_dispatch:

jobs:
  verify-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify evidence-source URLs
        run: pnpm verify:sources

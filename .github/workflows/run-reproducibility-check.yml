name: Run Reproducibility Check

on:
  pull_request:
    paths:
      - "problem-packs/**"
      - "scripts/check-reproducibility.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

jobs:
  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run reproducibility check
        run: pnpm reproducibility:check
